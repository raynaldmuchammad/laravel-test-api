server {
    listen 80;
    # server_name potopop.id www.potopop.id; # activate before push to branch
    index index.php index.html;

    error_log /var/log/nginx/laravel-test-api.error.log;
    access_log /var/log/nginx/laravel-test-api.access.log;

    root /var/www/html/laravel-test-api/public;
    client_max_body_size 10M;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass laravel-test-api:9000;
        # fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # fastcgi_param HTTPS on; # activate before push to branch
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ ^/api {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
	}
}